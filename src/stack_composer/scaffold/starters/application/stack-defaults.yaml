# TODO(scaffold): Replace direct-application defaults with site policy.
schema_version: 1

profile_contract:
  schema_version: 1

spack:
  floor: "1.1.1"

modules:
  format: tcl
  additional_formats: []
  exposure: direct
  init_module: null
  module_root: ScaffoldApplication
  hierarchy_style: collapsed
  expose_provenance: true
  platform_module_policy: prereq

externals:
  compilers: prefer_platform
  mpi: prefer_platform
  openssl: system
  curl: system
  fabric_userspace: prefer_platform
  gpu_toolkit: prefer_platform

buildcache:
  spack_generation: "spack-{spack_version}/repo-{package_repo_generation}"
  payload_lane: "payload/{os_id}/glibc-{glibc}/{spack_generation}/{system}"
  signed: false
  push_after_every_step: true

release:
  save_lockfiles: true
  save_manifest: true
  retain_previous: 2
  promotion: gated_manual

helpers:
  inspector: available
  render: available
  ansible: available
