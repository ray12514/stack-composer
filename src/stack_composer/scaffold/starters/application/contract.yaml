# TODO(scaffold): Review application-specific contract vocabulary.
schema_version: 1

build_classes:
  app:
    lane_kind: app
    package_set_kind: app
    default_target: payload_default
    requires: [runtime_cpu]
  app-mpi:
    lane_kind: app-mpi
    package_set_kind: app
    default_target: payload_default
    requires: [runtime_cpu, mpi]
  app-gpu:
    lane_kind: app-gpu
    package_set_kind: app
    default_target: payload_default
    requires: [runtime_gpu, mpi, gpu_toolkit]

toolchains:
  scaffold-app:
    compiler: each_application_compiler
    mpi: none
    gpu_toolkit: none
  scaffold-app-mpi:
    compiler: each_application_mpi_compiler
    mpi: platform_then_stack_mpi
    gpu_toolkit: none
  scaffold-app-gpu:
    compiler: gnu_host_default
    mpi: platform_mpi_required
    gpu_toolkit: prefer_platform

node_selectors:
  cpu:
    match: runtime_without_gpu
  gpu:
    match: runtime_with_gpu

gpu_selectors:
  amd-gpu:
    vendor: amd
    arch_target: gfx90a
    spack:
      amdgpu_target: gfx90a
  nvidia-gpu:
    vendor: nvidia
    arch_target: sm_80
    spack:
      cuda_arch: "80"

target_policies:
  payload_default:
    resolve: runtime_preferred
    hard_require: false
