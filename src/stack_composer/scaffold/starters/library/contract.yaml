# TODO(scaffold): Review contract vocabulary before promoting this starter.
schema_version: 1

build_classes:
  core:
    lane_kind: core
    package_set_kind: core
    default_target: foundation
    requires: [runtime_cpu]
  serial:
    lane_kind: serial
    package_set_kind: serial
    default_target: payload_default
    requires: [runtime_cpu]
  mpi:
    lane_kind: mpi
    package_set_kind: mpi
    default_target: payload_default
    requires: [runtime_cpu, mpi]
  gpu:
    lane_kind: gpu
    package_set_kind: gpu
    default_target: payload_default
    requires: [runtime_gpu, mpi, gpu_toolkit]

toolchains:
  scaffold-core:
    compiler: each_science_core_compiler
    mpi: none
    gpu_toolkit: none
  scaffold-serial:
    compiler: each_science_serial_compiler
    mpi: none
    gpu_toolkit: none
  scaffold-mpi:
    compiler: each_science_mpi_compiler
    mpi: platform_then_stack_mpi
    gpu_toolkit: none
  scaffold-gpu:
    compiler: gnu_host_default
    mpi: platform_mpi_required
    gpu_toolkit: prefer_platform

node_selectors:
  cpu:
    match: runtime_without_gpu
  gpu:
    match: runtime_with_gpu

gpu_selectors:
  amd-gpu:
    vendor: amd
    arch_target: gfx90a
    spack:
      amdgpu_target: gfx90a
  nvidia-gpu:
    vendor: nvidia
    arch_target: sm_80
    spack:
      cuda_arch: "80"

vendor_scope_selectors:
  cray:
    profile_key: vendor_cray
    scope: vendor/cray
  linux:
    default: true
    scope: vendor/linux

target_policies:
  foundation:
    resolve: baseline_x86_64_v3
    hard_require: false
  payload_default:
    resolve: runtime_preferred
    hard_require: false
