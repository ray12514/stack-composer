# Canonical science-stack multi-build stack, spec-native against the v6 defaults.
# Selection (compilers/mpi/gpu/target) comes from defaults.yaml; overridden here
# only where this stack differs, and narrowed per system.

schema_version: 1
name: science-stack

profile_contract:
  schema_version: 1

templates:
  set: v6

spack:
  version: ">=1.1.1,<1.2"

builds:
  - name: core
    kind: cpu
    package_set: core-foundation
    target: baseline
  - name: serial
    kind: cpu
    package_set: science-full
  - name: mpi
    kind: mpi
    package_set: science-full
  - name: gpu
    kind: gpu
    package_set: science-full

per_system:
  example-cray:
    builds:
      core:
        compilers: [gcc, cce]
      serial:
        compilers: [gcc, cce]
      mpi:
        compilers: [gcc, cce]
      gpu:
        compilers: [gcc]
        gpu_archs: [gfx90a]

package_repositories:
  - name: science
    namespace: science
    path: package-repos/science
    priority: before_builtin
